# MySQL. Versions 5.5.8 and up are supported.
#
# Install the MySQL driver
#   gem install mysql2
#
# Ensure the MySQL gem is defined in your Gemfile
#   gem "mysql2"
#
default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: root
  password: <%= ENV.fetch("MYSQL_PASSWORD", "") %>
  socket: /tmp/mysql.sock

development:
  <<: *default
  database: fresh_stack_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: fresh_stack_test

production:
  primary:
    <<: *default
    database: fresh_stack_production
    username: fresh_stack
    password: <%= ENV["FRESH_STACK_DATABASE_PASSWORD"] %>
  cache:
    <<: *default
    database: fresh_stack_production_cache
    username: fresh_stack
    password: <%= ENV["FRESH_STACK_DATABASE_PASSWORD"] %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: fresh_stack_production_queue
    username: fresh_stack
    password: <%= ENV["FRESH_STACK_DATABASE_PASSWORD"] %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: fresh_stack_production_cable
    username: fresh_stack
    password: <%= ENV["FRESH_STACK_DATABASE_PASSWORD"] %>
    migrations_paths: db/cable_migrate
